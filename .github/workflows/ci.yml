name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone agentspec SDK
        run: |
          git clone --depth 1 --branch typescript-sdk https://github.com/spichen/agent-spec.git ../agent-spec
          cd ../agent-spec/tsagentspec && npm ci && npm run build

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
