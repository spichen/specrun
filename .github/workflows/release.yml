name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history + write access to push version bump commit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone agentspec SDK
        run: |
          git clone --depth 1 --branch typescript-sdk https://github.com/spichen/agent-spec.git ../agent-spec
          cd ../agent-spec/tsagentspec && npm ci && npm run build

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Bump package.json version and commit back to main
      - name: Bump package.json version
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "Bump version to ${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - run: npm ci
      - run: npm test
      - run: npm run build

      # Create GitHub Release
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to npm
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Update Homebrew formula
      - name: Update Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: specrun
          homebrew-tap: spichen/homebrew-tap
          tag-name: ${{ github.ref_name }}
          download-url: https://github.com/spichen/specrun/archive/refs/tags/${{ github.ref_name }}.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
